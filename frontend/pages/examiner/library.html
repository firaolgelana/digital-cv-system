<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Examiner Library</title>
    <link rel="stylesheet" href="../../assets/css/pages/examiner/library.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="container topbar-inner">
          <div class="brand">
            <span class="brand-mark">CV</span> Examiner Library
          </div>
          <a class="btn" href="../auth/login.html">Logout</a>
        </div>
      </header>
      <main class="main">
        <div class="container section-stack">
          <section class="card">
            <h1 class="card-title">Approved CVs</h1>
            <div class="form-grid two" style="margin-top: 12px">
              <select class="select">
                <option>Department</option></select
              ><select class="select">
                <option>Year</option>
              </select>
            </div>
            <div style="margin-top: 8px">
              <input class="searchbar" placeholder="Search by skills..." />
            </div>
          </section>
          <section class="grid-3">
            <article class="card tight">
              <h3 class="card-title">Student A</h3>
              <p class="meta">CS | 2025</p>
              <div class="btn-row"><button class="btn">Open CV</button></div>
            </article>
            <article class="card tight">
              <h3 class="card-title">Student B</h3>
              <p class="meta">SE | 2025</p>
              <div class="btn-row"><button class="btn">Open CV</button></div>
            </article>
          </section>
          <section class="card">
            <h2 class="card-title">Evaluation Notes</h2>
            <textarea
              class="textarea"
              placeholder="Optional notes..."
            ></textarea>
            <div class="btn-row" style="margin-top: 8px">
              <button class="btn btn-primary">Save</button>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>

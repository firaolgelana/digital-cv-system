<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Examiner Library</title>
    <link rel="stylesheet" href="../../assets/css/pages/examiner/library.css" />
  </head>
  <body>
    <div class="page">
    <header class="top-navbar">
      <div class="brand-area">
        <div class="brand-icon"><i class="fas fa-file-signature"></i></div>
        <span class="text-gradient">DigiCV</span>
      </div>
      <button class="hamburger-btn" id="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
      <nav class="nav-links" id="main-nav">
        <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Back</a>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="profile.html" class="mobile-only"><i class="fas fa-user-cog"></i> Profile Settings</a>
        <a href="index.html" class="mobile-only" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Sign out</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" style="text-decoration:none"><div class="avatar avatar--sm avatar--primary" title="Profile Settings">US</div></a>
        <a class="btn btn-ghost btn-icon" href="index.html" title="Sign out"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </header>
      <main class="main">
        <div class="container section-stack">
          <section class="card">
            <h1 class="card-title">Approved CVs</h1>
            <div class="form-grid two" style="margin-top: 12px">
              <select class="select">
                <option>Department</option></select
              ><select class="select">
                <option>Year</option>
              </select>
            </div>
            <div style="margin-top: 8px">
              <input class="searchbar" placeholder="Search by skills..." />
            </div>
          </section>
          <section class="grid-3">
            <article class="card tight">
              <h3 class="card-title">Student A</h3>
              <p class="meta">CS | 2025</p>
              <div class="btn-row"><button class="btn">Open CV</button></div>
            </article>
            <article class="card tight">
              <h3 class="card-title">Student B</h3>
              <p class="meta">SE | 2025</p>
              <div class="btn-row"><button class="btn">Open CV</button></div>
            </article>
          </section>
          <section class="card">
            <h2 class="card-title">Evaluation Notes</h2>
            <textarea
              class="textarea"
              placeholder="Optional notes..."
            ></textarea>
            <div class="btn-row" style="margin-top: 8px">
              <button class="btn btn-primary">Save</button>
            </div>
          </section>
        </div>
      </main>
    </div>
  
    <script>
      // Mobile Menu Toggle
      if(document.getElementById('mobile-menu-toggle') && !window.mobileMenuInitialized){
        document.getElementById('mobile-menu-toggle').addEventListener('click', () => {
          document.getElementById('main-nav').classList.toggle('mobile-open');
        });
        window.mobileMenuInitialized = true;
      }
    </script>
  </body>
</html>

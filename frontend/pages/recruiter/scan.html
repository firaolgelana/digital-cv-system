<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recruiter Scan</title>
    <link rel="stylesheet" href="../../assets/css/pages/recruiter/scan.css" />
  </head>
  <body>
    <div class="page">
    <header class="top-navbar">
      <div class="brand-area">
        <div class="brand-icon"><i class="fas fa-file-signature"></i></div>
        <span class="text-gradient">DigiCV</span>
      </div>
      <button class="hamburger-btn" id="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
      <nav class="nav-links" id="main-nav">
        <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Back</a>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="profile.html" class="mobile-only"><i class="fas fa-user-cog"></i> Profile Settings</a>
        <a href="index.html" class="mobile-only" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Sign out</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" style="text-decoration:none"><div class="avatar avatar--sm avatar--primary" title="Profile Settings">US</div></a>
        <a class="btn btn-ghost btn-icon" href="index.html" title="Sign out"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </header>
      <main class="main">
        <div class="container section-stack">
          <section class="card center-box">
            <h1 class="card-title">Scan QR Code</h1>
            <p class="card-subtitle">Use camera to open verified CV.</p>
            <div class="scanner" style="margin-top: 16px">Scan Area</div>
          </section>
          <section class="card">
            <h2 class="card-title">CV After Scan</h2>
            <p><strong>Student Name</strong> - Software Engineer</p>
            <p class="muted">
              Education timeline, experience list, and skill tags shown here.
            </p>
            <div class="tag-list" style="margin: 8px 0">
              <span class="tag">JavaScript</span><span class="tag">SQL</span>
            </div>
            <button class="btn btn-primary">Download CV</button>
          </section>
        </div>
      </main>
    </div>
  
    <script>
      // Mobile Menu Toggle
      if(document.getElementById('mobile-menu-toggle') && !window.mobileMenuInitialized){
        document.getElementById('mobile-menu-toggle').addEventListener('click', () => {
          document.getElementById('main-nav').classList.toggle('mobile-open');
        });
        window.mobileMenuInitialized = true;
      }
    </script>
  </body>
</html>

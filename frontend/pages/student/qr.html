<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code</title>
    <link rel="stylesheet" href="../../assets/css/pages/student/qr.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="container topbar-inner">
          <div class="brand"><span class="brand-mark">CV</span> QR Sharing</div>
          <a class="btn" href="./home.html">Back</a>
        </div>

      <main class="main">
        <div class="container">
          <div class="card center-box">
            <h1 class="card-title">CV QR Code</h1>

            </p>

      </main>

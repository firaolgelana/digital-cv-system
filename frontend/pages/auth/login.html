<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — DigiCV</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <link rel="stylesheet" href="../../assets/css/pages/auth/login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card animate-fade-in">
        
        <!-- Left Hero Panel -->
        <section class="auth-panel hero" style="background:var(--surface-alt)">
          <div class="auth-hero-content">
            <div class="brand-area" style="color:#fff;margin-bottom:auto">
              <div class="brand-icon"><i class="fas fa-file-signature"></i></div>
              <span style="font-weight:700">DigiCV Core</span>
            </div>
            
            <div style="margin-top:100px;">
              <h1 class="auth-title">Build. Verify.<br><span>Get Hired.</span></h1>
              <p class="auth-sub" style="color:var(--text);opacity:0.9">One centralized platform connecting brilliant students with recruiters.</p>
            </div>
          </div>
        </section>

        <!-- Right Login Panel -->
        <section class="auth-panel" style="background:var(--surface)">
          <div class="auth-meta">
            <h2 class="auth-title" style="font-size: 2rem">Sign in</h2>
            <p class="auth-sub">Use your role and continue your workflow securely.</p>
          </div>

          <form class="section-stack" id="login-form">
            <div class="form-group" style="margin:0">
              <label class="label" for="role">User Role</label>
              <div style="position:relative">
                <i class="fas fa-user-tag" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                <select class="select" id="role" style="padding-left:42px" required>
                  <option value="student">Graduate Student</option>
                  <option value="supervisor">Project Supervisor</option>
                  <option value="examiner">Examiner</option>
                  <option value="recruiter">Recruiter</option>
                  <option value="admin">System Manager</option>
                </select>
              </div>
            </div>

            <div class="form-group" style="margin:0">
              <label class="label" for="email">University Email</label>
              <div style="position:relative">
                <i class="fas fa-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                <input class="input" id="email" type="email" placeholder="name@university.edu" style="padding-left:42px" required />
              </div>
              <div class="error-msg" id="email-error">Please enter a valid institution email.</div>
            </div>

            <div class="form-group" style="margin:0">
              <label class="label" for="password">Password</label>
              <div style="position:relative">
                <i class="fas fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                <input class="input" id="password" type="password" placeholder="••••••••" style="padding-left:42px" required />
              </div>
            </div>

            <button class="btn btn-primary btn-lg" id="login-btn" type="submit" style="width:100%;margin-top:8px">
              Login <i class="fas fa-arrow-right" style="margin-left:4px"></i>
            </button>
            
            <p style="text-align:center;font-size:0.9rem;color:var(--text-muted);margin-top:16px">
              Don't have an account? <a href="register.html" style="font-weight:600">Register now</a>
            </p>
          </form>
        </section>

      </div>
    </div>

    <!-- Generic Mock Script (Frontend Only) -->
    <script>
      document.getElementById("login-form").addEventListener("submit", function (e) {
        e.preventDefault();
        // Validation mock
        const email = document.getElementById("email").value;
        if(email.length < 5 || !email.includes('@')) {
           document.getElementById("email-error").style.display = "block";
           return;
        }
        document.getElementById("email-error").style.display = "none";
        
        const btn = document.getElementById("login-btn");
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
        btn.disabled = true;
        
        const role = document.getElementById("role").value;
        setTimeout(function () {
          // Hardcoded redirects for frontend demonstration based on structure
          const urls = {
            'student': '../../../student-dashboard.php',
            'admin': '../../../admin-dashboard.php',
            'supervisor': '../../../supervisor-dashboard.html',
            'examiner': '../../../examiner-dashboard.html',
            'recruiter': '../../../recruiter-view.html'
          };
          window.location.href = urls[role];
        }, 600);
      });
    </script>
  </body>
</html>

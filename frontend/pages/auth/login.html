<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — DigiCV</title>
    <link rel="stylesheet" href="../../../styles.css" />
    <link rel="stylesheet" href="../../assets/css/pages/auth/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="../../assets/js/app.js"></script>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card animate-fade-in">
        <!-- Left Hero Panel -->
        <section class="auth-panel hero">
          <div class="auth-hero-content">
            <div class="brand-area" style="color: #fff; margin-bottom: auto">
              <div class="brand-icon">
                <i class="fas fa-file-signature"></i>
              </div>
              <span style="font-weight: 700">DigiCV Core</span>
            </div>

            <div style="margin-top: 100px">
              <h1 class="auth-title">
                Build. Verify.<br /><span>Get Hired.</span>
              </h1>
              <p class="auth-sub" style="color: var(--text); opacity: 0.9">
                One centralized platform connecting brilliant students with
                recruiters.
              </p>
            </div>
          </div>
        </section>

        <!-- Right Login Panel -->
        <section class="auth-panel" style="background: var(--surface)">
          <div class="auth-meta">
            <h2 class="auth-title" style="font-size: 2rem">Sign in</h2>
            <p class="auth-sub">
              Continue your workflow securely with your account credentials.
            </p>
          </div>

          <form class="section-stack" id="login-form">
            <div class="form-group" style="margin: 0">
              <label class="label" for="email">University Email</label>
              <div style="position: relative">
                <i
                  class="fas fa-envelope"
                  style="
                    position: absolute;
                    left: 14px;
                    top: 50%;
                    transform: translateY(-50%);
                    color: var(--text-muted);
                  "
                ></i>
                <input
                  class="input"
                  id="email"
                  type="email"
                  placeholder="name@university.edu"
                  style="padding-left: 42px"
                  required
                />
              </div>
            </div>

            <div class="form-group" style="margin: 0">
              <label class="label" for="password">Password</label>
              <div style="position: relative">
                <i
                  class="fas fa-lock"
                  style="
                    position: absolute;
                    left: 14px;
                    top: 50%;
                    transform: translateY(-50%);
                    color: var(--text-muted);
                  "
                ></i>
                <input
                  class="input"
                  id="password"
                  type="password"
                  placeholder="••••••••"
                  style="padding-left: 42px"
                  required
                />
              </div>
            </div>

            <button
              class="btn btn-primary btn-lg"
              id="login-btn"
              type="submit"
              style="width: 100%; margin-top: 8px"
            >
              Login <i class="fas fa-arrow-right" style="margin-left: 4px"></i>
            </button>

            <p
              style="
                text-align: center;
                font-size: 0.9rem;
                color: var(--text-muted);
                margin-top: 16px;
              "
            >
              Don't have an account?
              <a href="register.html" style="font-weight: 600">Register now</a>
            </p>
          </form>
        </section>
      </div>
    </div>

    <script>
      (function () {
        const form = document.getElementById("login-form");
        const emailInput = document.getElementById("email");
        const submitBtn = document.getElementById("login-btn");

        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = emailInput.value.trim();
          if (email.length < 5 || !email.includes("@")) {
            window.DigiCVApp.toast("Enter a valid university email address.", {
              type: "warning",
              title: "Invalid email",
            });
            return;
          }

          const payload = {
            email: email,
            password: document.getElementById("password").value,
          };

          try {
            window.DigiCVApp.setButtonLoading(
              submitBtn,
              true,
              "Authenticating...",
            );

            const data = await window.DigiCVApp.authRequest(
              "../../../php_actions/login_action.php",
              payload,
            );

            if (!data.success) {
              window.DigiCVApp.toast(data.message || "Login failed.", {
                type: "error",
                title: "Login failed",
              });
              return;
            }

            window.DigiCVApp.toast(data.message || "Login successful.", {
              type: "success",
              title: "Welcome back",
            });
            window.location.href = data.redirect || "../../../index.html";
          } catch (error) {
            window.DigiCVApp.toast(
              error.message || "Network error. Please try again.",
              {
                type: "error",
                title: "Unable to sign in",
              },
            );
          } finally {
            window.DigiCVApp.setButtonLoading(submitBtn, false, "Login");
          }
        });
      })();
    </script>
  </body>
</html>

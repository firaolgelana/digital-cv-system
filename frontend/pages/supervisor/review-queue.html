<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supervisor Review Queue</title>
    <link
      rel="stylesheet"
      href="../../assets/css/pages/supervisor/review-queue.css"
    />
  </head>
  <body>
    <div class="page">
    <header class="top-navbar">
      <div class="brand-area">
        <div class="brand-icon"><i class="fas fa-file-signature"></i></div>
        <span class="text-gradient">DigiCV</span>
      </div>
      <button class="hamburger-btn" id="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
      <nav class="nav-links" id="main-nav">
        <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Back</a>
        <a href="profile.html" class="mobile-only"><i class="fas fa-user-cog"></i> Profile Settings</a>
        <a href="index.html" class="mobile-only" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Sign out</a>
      </nav>
      <div class="nav-user">
        <a href="profile.html" style="text-decoration:none"><div class="avatar avatar--sm avatar--primary" title="Profile Settings">US</div></a>
        <a class="btn btn-ghost btn-icon" href="index.html" title="Sign out"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </header>
      <main class="main">
        <div class="container section-stack">
          <section class="card">
            <h1 class="card-title">Submitted CV Queue</h1>
            <div class="section-stack" style="margin-top: 12px">
              <article class="list-card">
                <div class="list-head">
                  <strong>Student A</strong
                  ><span class="badge pending">Pending</span>
                </div>
                <div class="meta">Computer Science | Apr 21, 2026</div>
              </article>
              <article class="list-card">
                <div class="list-head">
                  <strong>Student B</strong
                  ><span class="badge pending">Pending</span>
                </div>
                <div class="meta">Software Engineering | Apr 20, 2026</div>
              </article>
            </div>
          </section>
          <section class="split">
            <div class="card">
              <h2 class="card-title">CV Preview</h2>
              <div style="max-height: 620px; overflow: auto">
                <article
                  class="a4-sheet"
                  style="border: none; box-shadow: none; padding: 0"
                >
                  <h1 class="a4-name">Student A</h1>
                  <p class="a4-headline">Junior Developer</p>
                  <section class="a4-section">
                    <h3>Education</h3>
                    <p>BSc CS</p>
                  </section>
                </article>
              </div>
            </div>
            <aside class="card sticky-panel">
              <h2 class="card-title">Decision Panel</h2>
              <div class="section-stack">
                <button class="btn btn-primary">Approve</button
                ><button class="btn btn-danger">Reject</button>
                <div>
                  <label class="label">Request changes</label
                  ><textarea class="textarea"></textarea>
                </div>
                <button class="btn">Send feedback</button>
              </div>
            </aside>
          </section>
        </div>
      </main>
    </div>
  
    <script>
      // Mobile Menu Toggle
      if(document.getElementById('mobile-menu-toggle') && !window.mobileMenuInitialized){
        document.getElementById('mobile-menu-toggle').addEventListener('click', () => {
          document.getElementById('main-nav').classList.toggle('mobile-open');
        });
        window.mobileMenuInitialized = true;
      }
    </script>
  </body>
</html>

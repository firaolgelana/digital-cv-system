<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Overview</title>
    <link rel="stylesheet" href="../../assets/css/pages/admin/overview.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="container topbar-inner">
          <div class="brand">
            <span class="brand-mark">CV</span> Admin Overview
          </div>
          <a class="btn" href="../auth/login.html">Logout</a>
        </div>
      </header>
      <main class="main">
        <div class="container section-stack">
          <section class="card">
            <h1 class="card-title">System Overview</h1>
            <div class="grid-4" style="margin-top: 12px">
              <div class="stat">
                <div class="stat-label">Total users</div>
                <div class="stat-value">156</div>
              </div>
              <div class="stat">
                <div class="stat-label">Total CVs</div>
                <div class="stat-value">89</div>
              </div>
              <div class="stat">
                <div class="stat-label">Approved CVs</div>
                <div class="stat-value">42</div>
              </div>
              <div class="stat">
                <div class="stat-label">QR scans</div>
                <div class="stat-value">1247</div>
              </div>
            </div>
          </section>
          <section class="card">
            <h2 class="card-title">Search</h2>
            <input class="searchbar" placeholder="Search users / CVs..." />
          </section>
          <section class="card">
            <h2 class="card-title">Activity Log</h2>
            <div class="activity-list">
              <div class="activity-item">CV submitted by Student A</div>
              <div class="activity-item">CV approved by Supervisor</div>
              <div class="activity-item">QR scanned by Recruiter</div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigiCV Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-wrap page">
      <div class="card auth-card" style="width: min(620px, 100%)">
        <div class="auth-meta">
          <div class="brand">
            <span class="brand-mark">CV</span> DigiCV Platform
          </div>
          <h1 class="auth-title">Create account</h1>
          <p class="auth-sub">Student onboarding for Digital CV workflow.</p>
        </div>

        <div id="reg-alert" class="activity-item" style="display: none"></div>

        <form id="register-form" class="form-grid">
          <div class="form-grid two">
            <div>
              <label class="label" for="reg-first-name">First name</label>
              <input class="input" id="reg-first-name" type="text" required />
            </div>
            <div>
              <label class="label" for="reg-last-name">Last name</label>
              <input class="input" id="reg-last-name" type="text" required />
            </div>
          </div>

          <div class="form-grid two">
            <div>
              <label class="label" for="reg-email">University email</label>
              <input class="input" id="reg-email" type="email" required />
            </div>
            <div>
              <label class="label" for="reg-student-id">Student ID</label>
              <input class="input" id="reg-student-id" type="text" required />
            </div>
          </div>

          <div>
            <label class="label" for="reg-department">Department</label>
            <input
              class="input"
              id="reg-department"
              type="text"
              list="reg-department-list"
              placeholder="Enter your department"
              required
            />
            <datalist id="reg-department-list">
              <option value="Computer Science"></option>
              <option value="Software Engineering"></option>
              <option value="Information Technology"></option>
              <option value="Information Systems"></option>
            </datalist>
          </div>

          <div class="form-grid two">
            <div>
              <label class="label" for="reg-password">Password</label>
              <input class="input" id="reg-password" type="password" required />
            </div>
            <div>
              <label class="label" for="reg-confirm-password"
                >Confirm password</label
              >
              <input
                class="input"
                id="reg-confirm-password"
                type="password"
                required
              />
            </div>
          </div>

          <div class="btn-row">
            <button id="reg-submit-btn" class="btn btn-primary" type="submit">
              Create account
            </button>
            <a class="btn" href="index.html">Back to sign in</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const form = document.getElementById("register-form");
        const alertBox = document.getElementById("reg-alert");
        const btn = document.getElementById("reg-submit-btn");

        function showAlert(message, ok) {
          alertBox.style.display = "block";
          alertBox.textContent = message;
          alertBox.style.background = ok ? "#ecf9f2" : "#fdf1f1";
          alertBox.style.borderColor = ok ? "#b6e3ce" : "#efc2c2";
          alertBox.style.color = ok ? "#1f8a5b" : "#b13a3a";
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          btn.disabled = true;
          btn.textContent = "Creating...";
          alertBox.style.display = "none";

          const payload = {
            first_name: document.getElementById("reg-first-name").value.trim(),
            last_name: document.getElementById("reg-last-name").value.trim(),
            email: document.getElementById("reg-email").value.trim(),
            student_id: document.getElementById("reg-student-id").value.trim(),
            department: document.getElementById("reg-department").value,
            password: document.getElementById("reg-password").value,
            confirm_password: document.getElementById("reg-confirm-password")
              .value,
          };

          try {
            const res = await fetch("php_actions/register_action.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const data = await res.json();
            if (data.success) {
              showAlert(data.message, true);
              setTimeout(() => {
                window.location.href = data.redirect;
              }, 800);
            } else {
              showAlert(data.message, false);
              btn.disabled = false;
              btn.textContent = "Create account";
            }
          } catch (err) {
            showAlert("Network error. Please try again.", false);
            btn.disabled = false;
            btn.textContent = "Create account";
          }
        });
      })();
    </script>
  </body>
</html>
